<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Printing in the Alps – 3D-Druck, Lasercutting, Lasergravur</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a class="logo" href="#">Printing in the Alps</a>
      <nav class="nav">
        <a href="#leistungen">Leistungen</a>
        <a href="#galerie">Galerie</a>
        <a href="#kontakt">Kontakt</a>
      </nav>
    </div>
  </header>

  <section class="hero" id="top">
    <div class="container">
      <h1>Printing in the Alps</h1>
      <p class="hero-sub">3D-Druck · Lasercutting · Lasergravur · Prototyping</p>
      <a href="#angebot" class="btn btn-primary">Angebot anfordern</a>
    </div>
  </section>

  <section id="leistungen" class="section">
    <div class="container">
      <h2>Leistungen</h2>
      <div class="grid-4" id="leistungen-grid"></div>
    </div>
  </section>

  <section id="galerie" class="section section-alt">
    <div class="container">
      <h2>Galerie</h2>
      <div id="gallery" class="grid-3"></div>
    </div>
  </section>

  <section id="kontakt" class="section">
    <div class="container">
      <h2>Kontakt / Angebot anfordern</h2>
      <p>Nutze das Kontaktformular oder sende eine Nachricht per Telegram.</p>
      <form>
        <input placeholder="Name" style="width:100%;padding:8px;margin:6px 0"/>
        <input placeholder="Email" type="email" style="width:100%;padding:8px;margin:6px 0"/>
        <textarea placeholder="Nachricht" style="width:100%;height:100px;margin:6px 0"></textarea>
        <button class="btn btn-primary" type="submit">Angebot anfordern</button>
      </form>
    </div>
  </section>

  <footer class="section" style="text-align:center;padding:20px 0">© 2026 Printing in the Alps</footer>

  <script src="js/main.js"></script>
</body>
</html>
