<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Printing in the Alps – MVP</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <span class="logo">Printing in the Alps</span>
      <nav class="nav">
        <a href="#leistungen">Leistungen</a>
        <a href="#galerie">Galerie</a>
        <a href="#kontakt">Kontakt</a>
      </nav>
    </div>
  </header>

  <section class="hero" id="top">
    <div class="container">
      <h1>Printing in the Alps</h1>
      <p class="hero-sub">3D-Druck • Lasercutting • Lasergravur • Prototyping</p>
      <a href="#kontakt" class="btn-primary btn">Angebot anfordern</a>
    </div>
  </section>

  <section id="leistungen" class="section">
    <div class="container">
      <h2>Leistungen</h2>
      <div id="leistungen-grid" class="grid-4"></div>
    </div>
  </section>

  <section id="galerie" class="section section-alt">
    <div class="container">
      <h2>Galerie</h2>
      <div id="gallery" class="grid-3"></div>
    </div>
  </section>

  <section id="kontakt" class="section">
    <div class="container">
      <h2>Kontakt</h2>
      <p>Kontaktformular folgt.</p>
    </div>
  </section>

  <footer class="section" style="text-align:center">© 2026 Printing in the Alps</footer>

  <script src="js/main.js"></script>
</body>
</html>
