<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 44" fill="none">
  <!-- Berg-Silhouette (beibehalten als Design-Element) -->
  <path d="M2 38 L14 12 L22 24 L30 8 L38 22 L44 14 L50 26 L54 38Z" fill="url(#mountain-grad)" opacity="0.9"/>
  <path d="M6 38 L16 20 L22 28 L28 16 L34 26 L40 18 L46 30 L50 38Z" fill="url(#mountain-grad2)" opacity="0.5"/>
  <!-- Schichtlinien im Berg (3D-Druck Referenz) -->
  <line x1="10" y1="30" x2="48" y2="30" stroke="#E8A000" stroke-width="0.5" opacity="0.3"/>
  <line x1="14" y1="24" x2="44" y2="24" stroke="#E8A000" stroke-width="0.5" opacity="0.25"/>
  <line x1="18" y1="18" x2="40" y2="18" stroke="#E8A000" stroke-width="0.5" opacity="0.2"/>
  <!-- FACTUM Schriftzug -->
  <text x="62" y="30" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="24" letter-spacing="2" fill="white">
    FACTUM<tspan fill="#E8A000" font-size="20" dx="3">3D</tspan>
  </text>
  <!-- Gradients -->
  <defs>
    <linearGradient id="mountain-grad" x1="28" y1="8" x2="28" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8A000"/>
      <stop offset="100%" stop-color="#B87800"/>
    </linearGradient>
    <linearGradient id="mountain-grad2" x1="28" y1="16" x2="28" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8A000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#B87800" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
