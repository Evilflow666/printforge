<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mein Profil – PitA</title>
  <meta name="description" content="Dein PitA-Konto: Profil, Adresse und Bestellungen verwalten.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://plausible.io http://69.62.105.159:32768;">
  <script src="i18n.js?v=1773954349"></script>
  <style>body { background-image: linear-gradient(rgba(11,15,25,0.72), rgba(11,15,25,0.72)), url('alps-hero.webp') !important; }</style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><img src="logo.jpg" alt="PitA Logo" class="logo-img">Pit<span class="accent">A</span></a>
      <nav class="nav" id="mainNav" aria-label="Hauptnavigation">
        <a href="index.html#leistungen" data-i18n="nav.leistungen">Leistungen</a>
        <a href="materialien.html" data-i18n="nav.materialien">Materialien</a>
        <a href="katalog.html" data-i18n="nav.katalog">Katalog</a>
        <a href="index.html#galerie" data-i18n="nav.galerie">Galerie</a>
        <a href="index.html#kontakt" data-i18n="nav.kontakt">Kontakt</a>
        <a href="blog.html" data-i18n="nav.blog">Blog</a>
      </nav>
      <div class="lang-switcher">
        <button onclick="setLang('de')" data-lang="de" title="Deutsch">🇩🇪</button>
        <button onclick="setLang('en')" data-lang="en" title="English">🇬🇧</button>
        <button onclick="setLang('fr')" data-lang="fr" title="Français">🇫🇷</button>
        <button onclick="setLang('es')" data-lang="es" title="Español">🇪🇸</button>
        <button onclick="setLang('it')" data-lang="it" title="Italiano">🇮🇹</button>
      </div>
      <a href="warenkorb.html" class="cart-icon" aria-label="Warenkorb" title="Warenkorb" style="position:relative;">🛒<span id="cart-badge" class="cart-badge"></span></a>
      <div class="header-auth" id="header-auth">
        <button onclick="openAuthModal('login')" class="auth-btn-login" id="nav-login-btn" data-i18n="nav.login">Anmelden</button>
        <button onclick="openAuthModal('register')" class="auth-btn-register" id="nav-register-btn" data-i18n="nav.register">Registrieren</button>
        <a href="profil.html" class="auth-btn-user" id="nav-user-btn" style="display:none">👤 <span id="nav-user-name" data-i18n="nav.myaccount">Mein Konto</span></a>
      </div>
      <button class="mobile-toggle" aria-label="Menü öffnen" aria-expanded="false" aria-controls="mainNav">☰</button>
    </div>
  </header>

  <div class="sub-page-wrapper">

  <section class="sub-hero">
    <div class="container">
      <h1>👤 <span class="accent" data-i18n="profil.title">Mein Profil</span></h1>
    </div>
  </section>

  <section class="section">
    <div class="container" id="profil-content">

      <!-- Mein Profil -->
      <div class="profil-section">
        <h2 data-i18n="profil.title">Mein Profil</h2>
        <div class="profil-field">
          <label data-i18n="auth.name">Vor- und Nachname</label>
          <p class="profil-info" id="profil-name">—</p>
        </div>
        <div class="profil-field">
          <label data-i18n="auth.email">E-Mail</label>
          <p class="profil-info" id="profil-email">—</p>
        </div>
        <div class="profil-field">
          <label data-i18n="profil.since">Mitglied seit</label>
          <p class="profil-info" id="profil-since">—</p>
        </div>
      </div>

      <!-- Adresse -->
      <div class="profil-section">
        <h2 data-i18n="profil.address">Adresse</h2>
        <div class="profil-field">
          <label data-i18n="profil.street">Straße & Nr.</label>
          <input type="text" id="profil-street">
        </div>
        <div class="profil-field">
          <label data-i18n="profil.zip">PLZ</label>
          <input type="text" id="profil-zip">
        </div>
        <div class="profil-field">
          <label data-i18n="profil.city">Stadt</label>
          <input type="text" id="profil-city">
        </div>
        <div class="profil-field">
          <label data-i18n="profil.country">Land</label>
          <input type="text" id="profil-country">
        </div>
        <button class="profil-btn" onclick="saveAddress()" data-i18n="profil.save">Speichern</button>
        <span id="profil-save-msg" style="margin-left:12px;color:var(--accent);font-size:0.85rem;"></span>
      </div>

      <!-- Bestellungen -->
      <div class="profil-section">
        <h2 data-i18n="profil.orders">Meine Bestellungen</h2>
        <div id="profil-orders-wrap">
          <p class="profil-empty" data-i18n="profil.orders.empty">Noch keine Bestellungen.</p>
        </div>
      </div>

      <!-- Aktionen -->
      <div class="profil-section">
        <div class="profil-actions">
          <button class="profil-btn profil-btn-outline" onclick="Auth.logout()" data-i18n="profil.logout">Abmelden</button>
          <button class="profil-btn profil-btn-danger" onclick="confirmDeleteAccount()" data-i18n="profil.delete">Konto löschen</button>
        </div>
      </div>

    </div>
  </section>

  </div><!-- /sub-page-wrapper -->

  <!-- MOUNTAIN DIVIDER -->
  <div class="mountain-divider">
    <svg viewBox="0 0 1440 180" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,180 L0,120 L80,95 L160,110 L240,70 L320,90 L400,50 L480,75 L540,30 L600,60 L680,40 L720,15 L780,45 L840,25 L900,55 L960,35 L1020,65 L1080,45 L1140,70 L1200,50 L1280,80 L1360,60 L1440,90 L1440,180Z" fill="var(--bg)"/>
    </svg>
  </div>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="logo">Pit<span class="accent">A</span></span>
      <p><span data-i18n="footer.tagline">Präzision aus den Alpen.</span></p>
      <div class="footer-links">
        <a href="blog.html" data-i18n="nav.blog">Blog</a>
        <a href="faq.html" data-i18n="nav.faq">FAQ</a>
        <a href="impressum.html"><span data-i18n="footer.impressum">Impressum</span></a>
        <a href="datenschutz.html"><span data-i18n="footer.datenschutz">Datenschutz</span></a>
      </div>
    </div>
    <div class="footer-bottom">
      <p data-i18n="footer.copy">&copy; 2026 PitA. Alle Rechte vorbehalten.</p>
    </div>
  </footer>

  <script src="clippy.js"></script>
  <script src="cart.js"></script>
  <script src="auth.js"></script>
  <script>
    // Profil-Seite Init
    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.isLoggedIn()) {
        openAuthModal('login');
        return;
      }
      loadProfile();
    });

    function loadProfile() {
      const profile = Auth.getFullProfile();
      if (!profile) return;

      document.getElementById('profil-name').textContent = profile.name;
      document.getElementById('profil-email').textContent = profile.email;

      const date = new Date(profile.createdAt);
      const lang = typeof getLang === 'function' ? getLang() : 'de';
      document.getElementById('profil-since').textContent = date.toLocaleDateString(lang === 'de' ? 'de-DE' : lang, {
        year: 'numeric', month: 'long', day: 'numeric'
      });

      // Adresse
      document.getElementById('profil-street').value = profile.address.street || '';
      document.getElementById('profil-zip').value = profile.address.zip || '';
      document.getElementById('profil-city').value = profile.address.city || '';
      document.getElementById('profil-country').value = profile.address.country || '';

      // Bestellungen
      renderOrders(profile.orders);
    }

    function renderOrders(orders) {
      const wrap = document.getElementById('profil-orders-wrap');
      if (!orders || orders.length === 0) {
        wrap.innerHTML = '<p class="profil-empty" data-i18n="profil.orders.empty">Noch keine Bestellungen.</p>';
        if (typeof setLang === 'function' && typeof getLang === 'function') setLang(getLang());
        return;
      }
      let html = '<table class="profil-orders-table"><thead><tr>';
      html += '<th data-i18n="profil.orders.date">Datum</th>';
      html += '<th data-i18n="profil.orders.item">Artikel</th>';
      html += '<th data-i18n="profil.orders.price">Preis</th>';
      html += '<th data-i18n="profil.orders.status">Status</th>';
      html += '</tr></thead><tbody>';
      for (const o of orders) {
        html += '<tr>';
        html += '<td>' + (o.date || '—') + '</td>';
        html += '<td>' + (o.item || '—') + '</td>';
        html += '<td>' + (o.price || '—') + '</td>';
        html += '<td>' + (o.status || '—') + '</td>';
        html += '</tr>';
      }
      html += '</tbody></table>';
      wrap.innerHTML = html;
      if (typeof setLang === 'function' && typeof getLang === 'function') setLang(getLang());
    }

    async function saveAddress() {
      const address = {
        street: document.getElementById('profil-street').value.trim(),
        zip: document.getElementById('profil-zip').value.trim(),
        city: document.getElementById('profil-city').value.trim(),
        country: document.getElementById('profil-country').value.trim()
      };
      const result = await Auth.updateProfile({ address });
      if (result.ok) {
        const msg = document.getElementById('profil-save-msg');
        msg.textContent = typeof _t === 'function' ? _t('profil.saved') : 'Gespeichert!';
        setTimeout(() => { msg.textContent = ''; }, 3000);
      }
    }

    function confirmDeleteAccount() {
      const msg = typeof _t === 'function' ? _t('profil.delete.confirm') : 'Bist du sicher? Alle Daten werden gelöscht.';
      if (confirm(msg)) {
        Auth.deleteAccount();
        window.location.href = 'index.html';
      }
    }
  </script>
</body>
</html>
